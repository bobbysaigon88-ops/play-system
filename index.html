<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Play System V1</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    [data-generative-layout="true"].play-generative {
      --gap: 32px;
      width: min(100%, 1440px);
      margin: 80px auto;
      position: relative;
    }

    .play-card {
      position: absolute;
      background: rgba(36, 0, 255, 0.18);
      outline: 1px solid rgba(36, 0, 255, 0.6);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 12px;
      font-size: 12px;
    }
  </style>
</head>

<body>

  <div data-generative-layout="true" class="play-generative">

    <!-- Simulated CMS cards -->
    <div class="collection-item-index-cards" data-size="small">(01)</div>
    <div class="collection-item-index-cards" data-size="medium">(02)</div>
    <div class="collection-item-index-cards" data-size="large">(03)</div>
    <div class="collection-item-index-cards" data-size="xsmall">(04)</div>
    <div class="collection-item-index-cards" data-size="medium">(05)</div>
    <div class="collection-item-index-cards" data-size="large">(06)</div>
    <div class="collection-item-index-cards" data-size="small">(07)</div>
    <div class="collection-item-index-cards" data-size="medium">(08)</div>
    <div class="collection-item-index-cards" data-size="xsmall">(09)</div>
    <div class="collection-item-index-cards" data-size="large">(10)</div>
    <div class="collection-item-index-cards" data-size="medium">(11)</div>
    <div class="collection-item-index-cards" data-size="large">(12)</div>

  </div>

  <script>
  document.addEventListener("DOMContentLoaded", function () {

    const root = document.querySelector('[data-generative-layout="true"]');
    if (!root) return;

    const sourceCards = Array.from(
      root.querySelectorAll(".collection-item-index-cards")
    );

    const CONFIG = {
      columns: 12,
      gap: 32,
      topPadding: 80,
      bottomPadding: 120,
      rowStep: 260,

      sizeToSpan: {
        xsmall: 2,
        small: 3,
        medium: 4,
        large: 6
      },

      ratios: ["square", "landscape", "portrait"],
      bandOffset: {
        high: -80,
        mid: 0,
        low: 80
      }
    };

    function getCardSize(width, ratio) {
      if (ratio === "landscape") return { width, height: width * 0.66 };
      if (ratio === "portrait") return { width, height: width * 1.3 };
      return { width, height: width };
    }

    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function overlaps(a, b) {
      return !(
        a.x + a.width < b.x ||
        a.x > b.x + b.width ||
        a.y + a.height < b.y ||
        a.y > b.y + b.height
      );
    }

    function render() {

      const fieldWidth = root.clientWidth;
      const colWidth =
        (fieldWidth - CONFIG.gap * (CONFIG.columns - 1)) /
        CONFIG.columns;

      const placed = [];
      let colCursor = 1;
      let rowIndex = 0;
      let maxY = 0;

      sourceCards.forEach(function (sourceCard, index) {

        const size =
          (sourceCard.getAttribute("data-size") || "xsmall").toLowerCase();

        const span = CONFIG.sizeToSpan[size] || 2;

        if (colCursor + span - 1 > CONFIG.columns) {
          colCursor = 1;
          rowIndex++;
        }

        const ratio = pick(CONFIG.ratios);
        const yBand = pick(["high", "mid", "low"]);

        const width =
          colWidth * span + CONFIG.gap * (span - 1);

        const cardSize = getCardSize(width, ratio);

        const x =
          (colCursor - 1) * (colWidth + CONFIG.gap);

        const baseY =
          CONFIG.topPadding + rowIndex * CONFIG.rowStep;

        let y =
          baseY + CONFIG.bandOffset[yBand];

        let candidate = {
          x: x,
          y: y,
          width: cardSize.width,
          height: cardSize.height
        };

        let attempts = 0;

        while (
          placed.some((item) => overlaps(candidate, item)) &&
          attempts < 10
        ) {
          candidate.y += 24;
          attempts++;
        }

        const card = sourceCard.cloneNode(true);
        card.classList.add("play-card");

        card.style.left = candidate.x + "px";
        card.style.top = candidate.y + "px";
        card.style.width = candidate.width + "px";
        card.style.height = candidate.height + "px";

        root.appendChild(card);

        placed.push(candidate);

        maxY = Math.max(
          maxY,
          candidate.y + candidate.height
        );

        colCursor += span;
      });

      root.style.height =
        maxY + CONFIG.bottomPadding + "px";
    }

    render();
    window.addEventListener("resize", render);

  });
  </script>

</body>
</html>
